name: Release

# Signed APK releases (tags) + weekly OpenSSF Scorecard (isolated id-token job).

on:
  push:
    tags:
      - "v*.*.*"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0-alpha) — leave empty for Scorecard-only run"
        required: false
        default: ""
      run_scorecard:
        description: "Run OpenSSF Scorecard analysis"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

      - name: Verify release signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set. See README → Security → CI signing."
            exit 1
          fi

      - name: Assemble signed release APKs (all ABIs)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace --no-daemon

      - name: Verify APK signatures
        run: |
          APKSIGNER=$(find "${ANDROID_SDK_ROOT}/build-tools" -name apksigner -type f | sort -V | tail -1)
          for apk in app/build/outputs/apk/release/*-release.apk; do
            echo "Verifying $apk"
            "$APKSIGNER" verify --verbose "$apk"
          done

      - name: Collect release APKs
        run: |
          mkdir -p dist/release
          cp app/build/outputs/apk/release/*-release.apk dist/release/
          ls -lh dist/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: PGP Shield ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/release/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.event.inputs.tag, '-') }}

  scorecard:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_scorecard)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
