name: CI

# Unified pipeline: tests, debug APK, CodeQL, dependency review, KDoc docs.
# OpenSSF Scorecard lives in scorecard.yml (separate id-token job).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-debug:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

      - name: Unit tests
        run: ./gradlew test --stacktrace --no-daemon

      - name: Assemble debug APK (arm64-v8a)
        run: ./gradlew :app:assembleDebug -Ponionphone.devAbi=arm64-v8a --stacktrace --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-arm64-v8a
          path: app/build/outputs/apk/debug/*-debug.apk
          if-no-files-found: error
          retention-days: 14

  codeql:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build for CodeQL
        run: |
          ./gradlew --stop || true
          ./gradlew clean :app:assembleDebug -Ponionphone.devAbi=arm64-v8a \
            --no-daemon --no-build-cache --rerun-tasks

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  docs:
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

      - name: Generate KDoc (Dokka HTML)
        run: ./gradlew dokkaGenerate --stacktrace --no-daemon

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload documentation
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/dokka/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
