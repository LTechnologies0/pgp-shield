name: CI

# Single workflow for build, security, docs, and repo automation.
# One push/PR = one workflow run (conditional jobs). Scorecard is weekly in release.yml
# (cannot share id-token with GitHub Pages deploy in the same workflow).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  issues:
    types: [opened, labeled]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Build + tests + CodeQL (push, PR, manual) ───────────────────
  build:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

      - name: Unit tests
        run: ./gradlew test --stacktrace --no-daemon

      - name: Assemble debug APK (arm64-v8a)
        run: ./gradlew :app:assembleDebug -Ponionphone.devAbi=arm64-v8a --stacktrace --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-arm64-v8a
          path: app/build/outputs/apk/debug/*-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build for CodeQL
        run: |
          ./gradlew --stop || true
          ./gradlew clean :app:assembleDebug -Ponionphone.devAbi=arm64-v8a \
            --no-daemon --no-build-cache --rerun-tasks

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  # ── OWASP dependency diff (PR only) ───────────────────────────────
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5

  # ── KDoc → GitHub Pages (main push / manual) ──────────────────────
  docs:
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v4

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

      - name: Generate KDoc (Dokka HTML)
        run: ./gradlew dokkaGenerate --stacktrace --no-daemon

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload documentation
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/dokka/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ── Repo automation (event-gated, no extra workflow files) ──────────
  labeler:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  greetings:
    if: >
      github.event.action == 'opened' &&
      (github.event_name == 'issues' || github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening an issue on **PGP Shield**!

            - Check [docs/ARCHITECTURE.md](https://github.com/LTechnologies0/pgp-shield/blob/main/docs/ARCHITECTURE.md)
            - For security issues, use **private vulnerability reporting** (see SECURITY.md)
          pr-message: |
            Thanks for your pull request! CI runs tests, debug APK build, and CodeQL.
            Please add KDoc for new public APIs and ensure no secrets are committed.

  auto-assign:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: pozil/auto-assign-issue@v4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: LTechnologies0

  triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Label Dependabot issues
        if: contains(github.event.issue.user.login, 'dependabot')
        run: gh issue edit "${{ github.event.issue.number }}" --add-label dependencies

      - name: Label security issues
        if: >
          contains(github.event.issue.title, 'security') ||
          contains(github.event.issue.title, 'vulnerability') ||
          contains(github.event.issue.title, 'CVE')
        run: gh issue edit "${{ github.event.issue.number }}" --add-label security

  stale:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: security,enhancement,bug
          exempt-pr-labels: security,dependencies
          operations-per-run: 50

  release-drafter:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
