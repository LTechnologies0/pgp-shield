name: Security report
description: Report a security vulnerability (prefer private advisory)
title: "[Security]: "
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        **For sensitive issues, use [Private vulnerability reporting](https://github.com/LTechnologies0/pgp-shield/security/advisories/new) instead.**

        Do not include real passphrases, private keys, or keystores in this form.
  - type: input
    id: version
    attributes:
      label: Affected version
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact (data exposure, privilege escalation, etc.)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
