android:
  - changed-files:
      - any-glob-to-any-file:
          - "app/**"
          - "pgp-engine/**"
          - "data/**"
          - "encoding/**"
          - "api-client/**"
          - "**/*.kt"
          - "**/AndroidManifest.xml"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "**/build.gradle.kts"
          - "gradle/**"
          - ".github/dependabot.yml"

ci/cd:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"

security:
  - changed-files:
      - any-glob-to-any-file:
          - "SECURITY.md"
          - "gradle/privacy-logging.pro"
          - "gradle/release-signing.gradle"
          - ".github/workflows/scorecard.yml"

i18n:
  - changed-files:
      - any-glob-to-any-file:
          - "**/res/values*/**"

crypto:
  - changed-files:
      - any-glob-to-any-file:
          - "pgp-engine/**"
          - "app/src/main/java/**/crypto/**"
          - "app/src/main/java/**/intent/**"

overlay:
  - changed-files:
      - any-glob-to-any-file:
          - "app/src/main/java/**/overlay/**"
          - "encoding/**"
